baseURL = 'https://blog.hyunsang.dev/'
languageCode = 'ko-kr'
title = 'blog.hyunsang.dev'

# RSS 설정
enableRobotsTXT = true
[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
  term = ["HTML", "RSS"]

[build]
  writeStats = true
  # 빌드 성능 최적화
  useResourceCacheWhen = "always"

  [[build.cachebusters]]
    source = "assets/.*\\.(js|ts|jsx|tsx|css)"
    target = "(css|js)"
  [[build.cachebusters]]
    source = "(postcss|tailwind)\\.config\\.js"
    target = "css"

# 캐시 설정
[caches]
  [caches.assets]
    dir = ":resourceDir/_gen"
    maxAge = "8760h"  # 1년
  [caches.images]
    dir = ":resourceDir/_gen"
    maxAge = "8760h"
[caches.modules]
    dir = ":cacheDir/modules"
    maxAge = "8760h"

[params]
  description = "HyunSang's Tech Blog"
  author = 'HyunSang Jeff Park'
  bio = "학부에서 사이버 보안을 전공하며, 법학을 부전공하고 있습니다.\n사이버 보안 분야에서는 웹 취약점 분석과 침해사고 대응, 성문법과 규정 등을 통한 개인정보보호 및 관리에 관심을 가지고 공부하고 있습니다.\n법학에서는 실생활에서 일어나는 다양한 사인과 사이에서의 법적 분쟁에 대해 공부하고 있습니다.\n주로 형사법과 민사법(민법, 민사소송법, 민사집행법)에 관심이 많습니다."

  [[params.social]] 
    name = 'Website'
    url = 'https://hyunsang.dev'
  [[params.social]]
    name = 'GitHub'
    url = 'https://github.com/dev-hyunsang'

  [[params.social]]
    name = 'LinkedIn'
    url = 'https://linkedin.com/in/parkhyunsang'

  [[params.social]]
    name = 'Email'
    url = 'mailto:me@hyunsang.dev'

[markup]
  [markup.highlight]
    codeFences = false
    noClasses = true
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    endLevel = 3
    ordered = false
    startLevel = 2

[taxonomies]
  category = 'categories'
  tag = 'tags'


[menu]
  [[menu.main]]
    name = 'Posts'
    url = '/posts/'
    weight = 1

  [[menu.main]]
    name = 'Tags'
    url = '/tags/'
    weight = 2

  [[menu.main]]
    name = 'Categories'
    url = '/categories/'
    weight = 3

  [[menu.main]]
    name = '밑줄 친 문장들 📚'
    url = '/highlights/'
    weight = 4
