baseURL = 'https://blog.hyunsang.dev/'
languageCode = 'ko-KR'
title = 'blog.hyunsang.dev'

# RSS 설정
enableRobotsTXT = true
[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
  term = ["HTML", "RSS"]

[build]
  writeStats = true
  # 빌드 성능 최적화
  useResourceCacheWhen = "always"

  [[build.cachebusters]]
    source = "assets/.*\\.(js|ts|jsx|tsx|css)"
    target = "(css|js)"
  [[build.cachebusters]]
    source = "(postcss|tailwind)\\.config\\.js"
    target = "css"

# 캐시 설정
[caches]
  [caches.assets]
    dir = ":resourceDir/_gen"
    maxAge = "8760h"  # 1년
  [caches.images]
    dir = ":resourceDir/_gen"
    maxAge = "8760h"
[caches.modules]
    dir = ":cacheDir/modules"
    maxAge = "8760h"

[params]
  description = "HyunSang's tech blog"
  author = 'HyunSang Park'
  bio = "Information Security - B.S. / Minor in Law"

  [[params.social]] 
    name = 'Website'
    url = 'https://hyunsang.dev'
  [[params.social]]
    name = 'GitHub'
    url = 'https://github.com/dev-hyunsang'

  [[params.social]]
    name = 'LinkedIn'
    url = 'https://linkedin.com/in/parkhyunsang'

  [[params.social]]
    name = 'Email'
    url = 'mailto:me@hyunsang.dev'

[markup]
  [markup.highlight]
    codeFences = false
    noClasses = true
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    endLevel = 3
    ordered = false
    startLevel = 2

[taxonomies]
  category = 'categories'
  tag = 'tags'


[menu]
  [[menu.main]]
    name = 'Posts'
    url = '/posts/'
    weight = 1

  [[menu.main]]
    name = 'Topics'
    url = '/topics/'
    weight = 2

  [[menu.main]]
    name = '밑줄 친 문장들 📚'
    url = '/highlights/'
    weight = 3

  [[menu.main]]
    name = 'About me'
    url = '/about'
    weight = 4